    <rect x="576" y="792" width="122" height="46" rx="23" fill="#D5ECF4"/><text x="610" y="823" fill="#19303A" font-size="24">工作流</text>
    <rect x="716" y="792" width="154" height="46" rx="23" fill="#FFF6EF" stroke="#E97A3B"/><text x="770" y="823" fill="#B45309" font-size="24">OpenClaw</text>
    <rect x="888" y="792" width="122" height="46" rx="23" fill="#F8E6D7"/><text x="924" y="823" fill="#19303A" font-size="24">Prompt</text>
