<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="900" rx="32" fill="#F8F2E8"/>
  <circle cx="92" cy="320" r="88" fill="#D8DED8"/>
  <circle cx="1480" cy="94" r="74" fill="#F5D5C1"/>
  <circle cx="1454" cy="744" r="104" fill="#DADFCF"/>
  <rect x="220" y="28" width="1150" height="252" rx="34" fill="#FFF9F2"/>
  <text x="254" y="72" fill="#A34F2D" font-family="Georgia, 'Times New Roman', serif" font-size="24" font-weight="700">AI FOR TSINGYUN</text>
  <text x="252" y="152" fill="#19303A" font-family="Georgia, 'Times New Roman', serif" font-size="64" font-weight="700">从 LLM 到 Agent，再到</text>
  <text x="252" y="222" fill="#19303A" font-family="Georgia, 'Times New Roman', serif" font-size="64" font-weight="700">OpenClaw</text>
  <text x="252" y="284" fill="#31505B" font-family="Segoe UI, Arial, sans-serif" font-size="24">这一页面向公司同事，用来帮助大家理解 AI 的核心概念、能力边界与落地方式。</text>
  <rect x="890" y="56" width="430" height="196" rx="26" fill="#143D46"/>
  <text x="922" y="98" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">今天会看到什么</text>
  <line x1="922" y1="122" x2="1288" y2="122" stroke="#335760"/>
  <text x="922" y="166" fill="#F7E6D7" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700">Part 1</text>
  <text x="922" y="204" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="26">理解什么是 LLM，以及为什么它不总是正确。</text>
  <line x1="922" y1="228" x2="1288" y2="228" stroke="#335760"/>
  <rect x="252" y="360" width="246" height="118" rx="24" fill="#FFF9F2" stroke="#E7D9C7"/>
  <rect x="524" y="360" width="246" height="118" rx="24" fill="#FFF9F2" stroke="#E7D9C7"/>
  <rect x="796" y="360" width="246" height="118" rx="24" fill="#FFF9F2" stroke="#E7D9C7"/>
  <text x="286" y="418" fill="#19303A" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="800">12 个</text>
  <text x="286" y="456" fill="#7C8E90" font-family="Segoe UI, Arial, sans-serif" font-size="22">核心名词</text>
  <text x="556" y="418" fill="#19303A" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="800">7 段</text>
  <text x="556" y="456" fill="#7C8E90" font-family="Segoe UI, Arial, sans-serif" font-size="22">重点演示</text>
  <text x="824" y="418" fill="#19303A" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="800">认知拉齐</text>
  <text x="824" y="456" fill="#7C8E90" font-family="Segoe UI, Arial, sans-serif" font-size="22">培训目标</text>
  <text x="252" y="548" fill="#A34F2D" font-family="Georgia, 'Times New Roman', serif" font-size="24" font-weight="700">MEETING PURPOSE</text>
  <text x="252" y="612" fill="#19303A" font-family="Segoe UI, Arial, sans-serif" font-size="54" font-weight="800">今天这场培训，重点是统一认知</text>
  <text x="252" y="666" fill="#31505B" font-family="Segoe UI, Arial, sans-serif" font-size="24">不是技术深潜，而是帮助大家建立地图、看懂关键词与落地边界。</text>
  <rect x="252" y="720" width="1090" height="128" rx="28" fill="#FFF9F2" stroke="#E7D9C7"/>
  <text x="288" y="766" fill="#A34F2D" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="700">AI WORD CLOUD</text>
